version: '3.8'
services:

  gateway:
    container_name: apigateway
    build: ./apigateway
    volumes:
      - ./apigateway/code:/usr/src/app
    networks:
      - mscuby
    ports:
      - "3011:3011"
    working_dir: /usr/src/app
    command: bash -c "npm install && npm run dev"

  postgres:
    image: postgres:alpine
    container_name: postgres
    volumes:
      - ./db_setup:/db_setup
      - ./setup_databases.sh:/docker-entrypoint-initdb.d/setup_databases.sh
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - mscuby

  events-ms:
    container_name: events-ms
    build: ./events
    volumes:
      - ./events/code:/usr/src/app
    networks:
      - mscuby
    ports:
      - "3010:3010"
    working_dir: /usr/src/app
    env_file:
      - ./events/code/.env
    environment:
      DB_HOST: events-db
    command: bash -c "npm install && npm run dev "
    
networks:
  mscuby:
    driver: bridge